<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopAPI — E-Commerce Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --surface3: #242432;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --accent3: #43e97b;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --success: #43e97b;
      --warning: #f7b731;
      --danger: #ff4757;
      --pending: #f7b731;
      --confirmed: #6c63ff;
      --shipped: #43b0e9;
      --delivered: #43e97b;
      --cancelled: #ff4757;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NOISE TEXTURE */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* AUTH SCREEN */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    #auth-screen::after {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem;
      width: 100%;
      max-width: 440px;
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }

    .auth-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

    .tab-row {
      display: flex;
      gap: 0.5rem;
      background: var(--bg);
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 2rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 9px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .form-group { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }

    select option { background: var(--surface2); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #5a52e0; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(108,99,255,0.3); }

    .btn-danger {
      background: rgba(255,71,87,0.15);
      color: var(--danger);
      border: 1px solid rgba(255,71,87,0.3);
    }
    .btn-danger:hover { background: rgba(255,71,87,0.25); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface3); }

    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; border-radius: 7px; }
    .btn-full { width: 100%; justify-content: center; }

    .demo-creds {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-top: 1.2rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .demo-creds strong { color: var(--text); }
    .demo-creds .cred-row { display: flex; gap: 1rem; margin-top: 0.4rem; flex-wrap: wrap; }
    .cred-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .cred-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* MAIN APP */
    #app-screen { display: none; min-height: 100vh; }

    /* SIDEBAR */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; bottom: 0; left: 0;
      z-index: 100;
      transition: transform 0.3s;
    }

    .sidebar-logo {
      padding: 1.8rem 1.5rem 1.2rem;
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo span {
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--muted);
      -webkit-text-fill-color: var(--muted);
      margin-top: 0.1rem;
    }

    .nav-section { padding: 1rem 0.8rem; flex: 1; overflow-y: auto; }
    .nav-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 0 0.6rem;
      margin: 0.8rem 0 0.4rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.8rem;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(108,99,255,0.15); color: var(--accent); }
    .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }

    .sidebar-footer {
      padding: 1rem;
      border-top: 1px solid var(--border);
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem;
      border-radius: 10px;
      background: var(--surface2);
    }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: #fff;
      flex-shrink: 0;
    }

    .user-info { flex: 1; min-width: 0; }
    .user-name { font-weight: 600; font-size: 0.88rem; truncate: ellipsis; }
    .user-role {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .role-badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .role-badge.admin { background: rgba(108,99,255,0.2); color: var(--accent); }
    .role-badge.customer { background: rgba(67,233,123,0.15); color: var(--accent3); }

    /* MAIN CONTENT */
    .main {
      margin-left: 260px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .topbar-actions { display: flex; align-items: center; gap: 0.75rem; }

    .content { padding: 2rem; max-width: 1300px; }

    /* CARDS & STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: attr(data-icon);
      position: absolute;
      right: 1rem; top: 1rem;
      font-size: 2rem;
      opacity: 0.15;
    }

    .stat-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin: 0.3rem 0;
      background: linear-gradient(135deg, var(--text), var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-sub { font-size: 0.78rem; color: var(--accent3); }

    /* TABLE */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .table-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
    }

    .search-input-wrap {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .search-input {
      width: 220px;
      padding: 0.5rem 0.9rem;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 0.75rem 1.2rem;
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    tbody tr {
      border-bottom: 1px solid rgba(42,42,61,0.5);
      transition: background 0.15s;
    }

    tbody tr:hover { background: var(--surface2); }
    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 1rem 1.2rem;
      font-size: 0.88rem;
      vertical-align: middle;
    }

    .product-cell { display: flex; align-items: center; gap: 0.75rem; }
    .product-img {
      width: 44px; height: 44px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface3);
      flex-shrink: 0;
    }
    .product-name { font-weight: 500; font-size: 0.9rem; }
    .product-cats { font-size: 0.75rem; color: var(--muted); }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-pending { background: rgba(247,183,49,0.15); color: var(--warning); }
    .badge-confirmed { background: rgba(108,99,255,0.15); color: var(--accent); }
    .badge-shipped { background: rgba(67,176,233,0.15); color: #43b0e9; }
    .badge-delivered { background: rgba(67,233,123,0.15); color: var(--success); }
    .badge-cancelled { background: rgba(255,71,87,0.15); color: var(--danger); }
    .badge-in-stock { background: rgba(67,233,123,0.15); color: var(--success); }
    .badge-low-stock { background: rgba(247,183,49,0.15); color: var(--warning); }
    .badge-out { background: rgba(255,71,87,0.15); color: var(--danger); }

    /* PRODUCT GRID */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }

    .product-card-img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      background: var(--surface2);
      display: block;
    }

    .product-card-body { padding: 1rem; }
    .product-card-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.92rem; margin-bottom: 0.3rem; }
    .product-card-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.8rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-card-price { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--accent); }
    .product-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 0.8rem; }

    /* CART */
    .cart-container { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; }
    .cart-item-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .cart-item-row:last-child { border-bottom: none; }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.2rem 0.5rem;
    }
    .qty-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      font-size: 1rem;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: var(--surface3); }

    .order-summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      height: fit-content;
      position: sticky;
      top: 80px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      margin-bottom: 0.8rem;
      color: var(--muted);
    }
    .summary-row.total {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      border-top: 1px solid var(--border);
      padding-top: 0.8rem;
      margin-top: 0.8rem;
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.2s;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.3rem; }
    .modal-close:hover { color: var(--text); }

    /* TOAST */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 9000;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1.2rem;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 280px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.info { border-left: 3px solid var(--accent); }

    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* FILTERS */
    .filters-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .filter-group label { font-size: 0.72rem; }
    .filter-group input, .filter-group select { width: 160px; }

    /* ORDER TIMELINE */
    .timeline {
      display: flex;
      gap: 0;
      margin: 1rem 0;
    }
    .timeline-step {
      flex: 1;
      text-align: center;
      position: relative;
    }
    .timeline-step::before {
      content: '';
      position: absolute;
      top: 14px;
      left: -50%;
      right: 50%;
      height: 2px;
      background: var(--border);
    }
    .timeline-step:first-child::before { display: none; }
    .timeline-step.done::before { background: var(--accent); }

    .timeline-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface3);
      border: 2px solid var(--border);
      margin: 0 auto 0.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      position: relative;
      z-index: 1;
    }
    .timeline-step.done .timeline-dot {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .timeline-step.current .timeline-dot {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 4px rgba(108,99,255,0.2);
    }
    .timeline-label { font-size: 0.68rem; color: var(--muted); }
    .timeline-step.done .timeline-label { color: var(--accent); }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.9rem; }

    /* PAGINATION */
    .pagination {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .page-btn {
      padding: 0.4rem 0.8rem;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .page-btn:hover, .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* LOADING */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .cart-container { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* UTILITIES */
    .flex { display: flex; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 0.75rem; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .text-muted { color: var(--muted); font-size: 0.85rem; }
    .text-accent { color: var(--accent); }
    .text-danger { color: var(--danger); }
    .text-success { color: var(--success); }
    .font-bold { font-weight: 700; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .mb-3 { margin-bottom: 1.5rem; }
    .p-0 { padding: 0; }

    .divider { height: 1px; background: var(--border); margin: 1rem 0; }

    .price-tag {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: var(--accent);
    }

    .actions-cell { display: flex; gap: 0.4rem; }
  </style>
</head>
<body>

<!-- ─── AUTH SCREEN ─── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">⚡ ShopAPI</div>
    <div class="auth-sub">E-Commerce Management System</div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password" />
      </div>
      <button class="btn btn-primary btn-full" onclick="handleLogin()">
        <span>Sign In</span>
      </button>
      <div class="demo-creds">
        <strong>Demo Accounts:</strong>
        <div class="cred-row">
          <div class="cred-chip" onclick="fillCreds('admin','admin123')">🔑 admin / admin123</div>
          <div class="cred-chip" onclick="fillCreds('customer','customer123')">👤 customer / customer123</div>
        </div>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="Choose a username" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" />
      </div>
      <button class="btn btn-primary btn-full" onclick="handleRegister()">
        Create Account
      </button>
    </div>
  </div>
</div>

<!-- ─── MAIN APP ─── -->
<div id="app-screen">
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        ⚡ ShopAPI
        <span>Order Management System</span>
      </div>

      <div class="nav-section">
        <div class="nav-label">Overview</div>
        <button class="nav-item active" onclick="navigate('dashboard')">
          <span class="icon">📊</span> Dashboard
        </button>

        <div class="nav-label">Catalog</div>
        <button class="nav-item" onclick="navigate('products')">
          <span class="icon">🛍️</span> Products
        </button>
        <button class="nav-item" onclick="navigate('categories')">
          <span class="icon">🏷️</span> Categories
        </button>

        <div class="nav-label">Shopping</div>
        <button class="nav-item" onclick="navigate('shop')">
          <span class="icon">🏪</span> Browse Shop
        </button>
        <button class="nav-item" onclick="navigate('cart')">
          <span class="icon">🛒</span> My Cart
          <span id="cart-badge" style="margin-left:auto; background:var(--accent); color:#fff; border-radius:20px; padding:0.1rem 0.5rem; font-size:0.7rem; display:none">0</span>
        </button>

        <div class="nav-label">Orders</div>
        <button class="nav-item" onclick="navigate('my-orders')">
          <span class="icon">📦</span> My Orders
        </button>
        <button class="nav-item admin-only" onclick="navigate('all-orders')">
          <span class="icon">📋</span> All Orders
        </button>
      </div>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar" id="user-avatar">U</div>
          <div class="user-info">
            <div class="user-name" id="user-display-name">User</div>
            <div class="user-role"><span class="role-badge" id="user-role-badge">Customer</span></div>
          </div>
          <button onclick="handleLogout()" title="Logout" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem">↩</button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <div class="page-title" id="page-title">Dashboard</div>
        <div class="topbar-actions">
          <span class="text-muted" id="api-status">⚡ API: <span style="color:var(--success)">Connected</span></span>
          <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Logout</button>
        </div>
      </div>

      <div class="content" id="page-content">
        <!-- Dynamic content renders here -->
      </div>
    </div>
  </div>
</div>

<!-- ─── MODALS ─── -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<!-- ─── TOAST ─── -->
<div class="toast-container" id="toast-container"></div>

<script>
  // ─── STATE ───
  const API = 'http://localhost:8080/api';
  let state = {
    token: localStorage.getItem('token'),
    user: JSON.parse(localStorage.getItem('user') || 'null'),
    cart: null,
    currentPage: 'dashboard'
  };

  // ─── API HELPERS ───
  async function api(path, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
    try {
      const res = await fetch(`${API}${path}`, { ...options, headers: { ...headers, ...(options.headers || {}) } });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Request failed');
      return data;
    } catch (e) {
      if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
        throw new Error('Cannot connect to API. Make sure the Spring Boot server is running on port 8080.');
      }
      throw e;
    }
  }

  // ─── TOAST ───
  function toast(msg, type = 'info') {
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${icons[type]}</span> ${msg}`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // ─── MODAL ───
  function openModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-backdrop').classList.add('open');
  }
  function closeModal(e) {
    if (e && e.target !== document.getElementById('modal-backdrop')) return;
    document.getElementById('modal-backdrop').classList.remove('open');
  }
  function closeModalForce() {
    document.getElementById('modal-backdrop').classList.remove('open');
  }

  // ─── AUTH ───
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  }

  function fillCreds(u, p) {
    document.getElementById('login-username').value = u;
    document.getElementById('login-password').value = p;
  }

  async function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) return toast('Fill in all fields', 'error');
    try {
      const res = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
      loginSuccess(res.data);
    } catch (e) { toast(e.message, 'error'); }
  }

  async function handleRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!username || !email || !password) return toast('Fill in all fields', 'error');
    try {
      const res = await api('/auth/register', { method: 'POST', body: JSON.stringify({ username, email, password }) });
      loginSuccess(res.data);
    } catch (e) { toast(e.message, 'error'); }
  }

  function loginSuccess(data) {
    state.token = data.token;
    state.user = data;
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data));
    initApp();
  }

  function handleLogout() {
    state.token = null; state.user = null; state.cart = null;
    localStorage.clear();
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }

  // ─── INIT ───
  function initApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';

    const u = state.user;
    document.getElementById('user-avatar').textContent = u.username[0].toUpperCase();
    document.getElementById('user-display-name').textContent = u.username;
    const badge = document.getElementById('user-role-badge');
    badge.textContent = u.role;
    badge.className = `role-badge ${u.role.toLowerCase()}`;

    const isAdmin = u.role === 'ADMIN';
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'flex' : 'none');

    loadCart();
    navigate('dashboard');
  }

  // ─── NAVIGATION ───
  function navigate(page) {
    state.currentPage = page;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(el => {
      if (el.getAttribute('onclick') && el.getAttribute('onclick').includes(`'${page}'`)) el.classList.add('active');
    });
    const titles = { dashboard: 'Dashboard', products: 'Product Management', categories: 'Categories', shop: 'Browse Shop', cart: 'Shopping Cart', 'my-orders': 'My Orders', 'all-orders': 'All Orders' };
    document.getElementById('page-title').textContent = titles[page] || page;
    const pages = { dashboard: renderDashboard, products: renderProducts, categories: renderCategories, shop: renderShop, cart: renderCart, 'my-orders': renderMyOrders, 'all-orders': renderAllOrders };
    if (pages[page]) pages[page]();
  }

  // ─── CART HELPER ───
  async function loadCart() {
    try {
      const res = await api('/cart');
      state.cart = res.data;
      updateCartBadge();
    } catch {}
  }
  function updateCartBadge() {
    const count = state.cart?.items?.length || 0;
    const badge = document.getElementById('cart-badge');
    badge.textContent = count;
    badge.style.display = count > 0 ? 'inline' : 'none';
  }

  // ─── FORMAT HELPERS ───
  const fmt = (n) => `$${parseFloat(n).toFixed(2)}`;
  const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
  function stockBadge(qty) {
    if (qty === 0) return '<span class="badge badge-out">Out of Stock</span>';
    if (qty < 10) return `<span class="badge badge-low-stock">Low: ${qty}</span>`;
    return `<span class="badge badge-in-stock">${qty} in stock</span>`;
  }
  function statusBadge(s) {
    return `<span class="badge badge-${s.toLowerCase()}">${s}</span>`;
  }
  function orderTimeline(status) {
    const steps = ['PENDING','CONFIRMED','SHIPPED','DELIVERED'];
    if (status === 'CANCELLED') return `<span class="badge badge-cancelled">CANCELLED</span>`;
    const idx = steps.indexOf(status);
    return `<div class="timeline">${steps.map((s,i)=>`
      <div class="timeline-step ${i<idx?'done':''} ${i===idx?'current':''}">
        <div class="timeline-dot">${i<idx?'✓':i+1}</div>
        <div class="timeline-label">${s.charAt(0)+s.slice(1).toLowerCase()}</div>
      </div>`).join('')}</div>`;
  }

  // ═══════════════════════════════════════════════
  // ─── DASHBOARD ───
  // ═══════════════════════════════════════════════
  async function renderDashboard() {
    const el = document.getElementById('page-content');
    el.innerHTML = `<div class="stats-grid">
      ${['Products','Categories','My Orders','Cart Items'].map(l=>`<div class="stat-card skeleton" style="height:100px"></div>`).join('')}
    </div>`;

    try {
      const [products, categories, orders] = await Promise.all([
        api('/products?size=1'),
        api('/categories'),
        api('/orders/my-orders')
      ]);

      const cartItems = state.cart?.items?.length || 0;
      const totalSpent = orders.data?.reduce((s,o) => s + parseFloat(o.totalAmount||0), 0) || 0;

      el.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card" data-icon="🛍️">
            <div class="stat-label">Total Products</div>
            <div class="stat-value">${products.data?.totalElements || 0}</div>
            <div class="stat-sub">In catalog</div>
          </div>
          <div class="stat-card" data-icon="🏷️">
            <div class="stat-label">Categories</div>
            <div class="stat-value">${categories.data?.length || 0}</div>
            <div class="stat-sub">Active</div>
          </div>
          <div class="stat-card" data-icon="📦">
            <div class="stat-label">My Orders</div>
            <div class="stat-value">${orders.data?.length || 0}</div>
            <div class="stat-sub">Total placed</div>
          </div>
          <div class="stat-card" data-icon="💰">
            <div class="stat-label">Total Spent</div>
            <div class="stat-value" style="font-size:1.5rem">${fmt(totalSpent)}</div>
            <div class="stat-sub">${cartItems} items in cart</div>
          </div>
        </div>

        ${orders.data?.length > 0 ? `
        <div class="table-card">
          <div class="table-header">
            <div class="table-title">Recent Orders</div>
            <button class="btn btn-ghost btn-sm" onclick="navigate('my-orders')">View All →</button>
          </div>
          <table>
            <thead><tr>
              <th>Order ID</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th>
            </tr></thead>
            <tbody>
              ${orders.data.slice(0,5).map(o=>`<tr>
                <td><span class="text-accent font-bold">#${o.id}</span></td>
                <td class="text-muted">${fmtDate(o.createdAt)}</td>
                <td>${o.orderItems?.length || 0} items</td>
                <td class="price-tag">${fmt(o.totalAmount)}</td>
                <td>${statusBadge(o.status)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>` : `
        <div class="table-card">
          <div class="empty-state">
            <div class="icon">🛒</div>
            <p>No orders yet. <a href="#" onclick="navigate('shop')" style="color:var(--accent)">Browse the shop</a> to get started!</p>
          </div>
        </div>`}
      `;
    } catch (e) {
      el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
    }
  }

  // ═══════════════════════════════════════════════
  // ─── PRODUCTS (Admin) ───
  // ═══════════════════════════════════════════════
  let productPage = 0;
  async function renderProducts() {
    const el = document.getElementById('page-content');
    const isAdmin = state.user?.role === 'ADMIN';
    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        ${isAdmin ? `<button class="btn btn-primary" onclick="openProductModal()">+ Add Product</button>` : '<div></div>'}
        <div class="search-input-wrap">
          <input class="search-input" id="prod-search" placeholder="Search products..." oninput="debounce(fetchProducts, 400)()"/>
        </div>
      </div>
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Product Catalog</div>
        </div>
        <div id="products-table-body">Loading...</div>
      </div>
      <div class="pagination" id="products-pagination"></div>`;
    fetchProducts();
  }

  let debounceTimer;
  function debounce(fn, delay) {
    return (...args) => { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => fn(...args), delay); };
  }

  async function fetchProducts() {
    const search = document.getElementById('prod-search')?.value || '';
    const isAdmin = state.user?.role === 'ADMIN';
    try {
      const res = await api(`/products/search?name=${encodeURIComponent(search)}&page=${productPage}&size=8`);
      const { content, totalPages, totalElements } = res.data;
      const body = document.getElementById('products-table-body');
      if (!content?.length) {
        body.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p>No products found</p></div>`;
        return;
      }
      body.innerHTML = `<table>
        <thead><tr>
          <th>Product</th><th>Price</th><th>Stock</th><th>Categories</th>${isAdmin ? '<th>Actions</th>' : ''}
        </tr></thead>
        <tbody>${content.map(p => `<tr>
          <td><div class="product-cell">
            <img class="product-img" src="${p.imageUrl||'https://via.placeholder.com/44'}" onerror="this.src='https://via.placeholder.com/44'" />
            <div><div class="product-name">${p.name}</div><div class="product-cats">${p.categories?.map(c=>c.name).join(', ')||'—'}</div></div>
          </div></td>
          <td class="price-tag">${fmt(p.price)}</td>
          <td>${stockBadge(p.stockQuantity)}</td>
          <td class="text-muted">${p.categories?.map(c=>`<span class="badge" style="background:var(--surface3);color:var(--muted);margin:1px">${c.name}</span>`).join(' ')||'—'}</td>
          ${isAdmin ? `<td><div class="actions-cell">
            <button class="btn btn-ghost btn-sm" onclick="openProductModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Del</button>
          </div></td>` : ''}
        </tr>`).join('')}</tbody>
      </table>`;
      renderPagination('products-pagination', productPage, totalPages, (p) => { productPage = p; fetchProducts(); });
    } catch (e) { toast(e.message, 'error'); }
  }

  function renderPagination(containerId, current, total, onClick) {
    const el = document.getElementById(containerId);
    if (!el || total <= 1) { if(el) el.innerHTML=''; return; }
    el.innerHTML = `
      <button class="page-btn" ${current===0?'disabled':''} onclick="(${onClick})(${current-1})">←</button>
      ${Array.from({length:Math.min(total,7)},(_,i)=>`<button class="page-btn ${i===current?'active':''}" onclick="(${onClick})(${i})">${i+1}</button>`).join('')}
      <button class="page-btn" ${current>=total-1?'disabled':''} onclick="(${onClick})(${current+1})">→</button>`;
  }

  function openProductModal(product = null) {
    openModal(`
      <div class="modal-title">
        ${product ? 'Edit Product' : 'Add New Product'}
        <button class="modal-close" onclick="closeModalForce()">✕</button>
      </div>
      <div class="form-group"><label>Name *</label><input id="m-name" value="${product?.name||''}" placeholder="Product name"/></div>
      <div class="form-group"><label>Description</label><textarea id="m-desc" rows="3" placeholder="Description...">${product?.description||''}</textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group"><label>Price *</label><input id="m-price" type="number" step="0.01" value="${product?.price||''}" placeholder="0.00"/></div>
        <div class="form-group"><label>Stock *</label><input id="m-stock" type="number" value="${product?.stockQuantity||''}" placeholder="0"/></div>
      </div>
      <div class="form-group"><label>Image URL</label><input id="m-img" value="${product?.imageUrl||''}" placeholder="https://..."/></div>
      <div class="form-group">
        <label>Categories</label>
        <div id="m-categories-loading">Loading categories...</div>
      </div>
      <button class="btn btn-primary btn-full" onclick="saveProduct(${product?.id||null})">
        ${product ? 'Update Product' : 'Create Product'}
      </button>`);
    loadCategoryCheckboxes(product?.categories?.map(c=>c.id)||[]);
  }

  async function loadCategoryCheckboxes(selected = []) {
    try {
      const res = await api('/categories');
      document.getElementById('m-categories-loading').innerHTML = `
        <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.3rem">
          ${res.data.map(c=>`
            <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.35rem 0.7rem;font-size:0.82rem">
              <input type="checkbox" value="${c.id}" ${selected.includes(c.id)?'checked':''} style="width:auto;margin:0"> ${c.name}
            </label>`).join('')}
        </div>`;
    } catch {}
  }

  async function saveProduct(id) {
    const name = document.getElementById('m-name').value.trim();
    const price = parseFloat(document.getElementById('m-price').value);
    const stockQuantity = parseInt(document.getElementById('m-stock').value);
    const description = document.getElementById('m-desc').value;
    const imageUrl = document.getElementById('m-img').value;
    const categoryIds = [...document.querySelectorAll('#m-categories-loading input[type=checkbox]:checked')].map(c=>parseInt(c.value));

    if (!name || !price || isNaN(stockQuantity)) return toast('Fill required fields', 'error');
    try {
      const body = { name, description, price, stockQuantity, imageUrl, categoryIds };
      if (id) {
        await api(`/products/${id}`, { method: 'PUT', body: JSON.stringify(body) });
        toast('Product updated!', 'success');
      } else {
        await api('/products', { method: 'POST', body: JSON.stringify(body) });
        toast('Product created!', 'success');
      }
      closeModalForce(); fetchProducts();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    try {
      await api(`/products/${id}`, { method: 'DELETE' });
      toast('Product deleted', 'success');
      fetchProducts();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ═══════════════════════════════════════════════
  // ─── CATEGORIES ───
  // ═══════════════════════════════════════════════
  async function renderCategories() {
    const el = document.getElementById('page-content');
    const isAdmin = state.user?.role === 'ADMIN';
    el.innerHTML = `
      ${isAdmin ? `<div class="mb-3"><button class="btn btn-primary" onclick="openCategoryModal()">+ Add Category</button></div>` : ''}
      <div class="table-card" id="cat-table">Loading...</div>`;
    fetchCategories();
  }

  async function fetchCategories() {
    try {
      const res = await api('/categories');
      const isAdmin = state.user?.role === 'ADMIN';
      document.getElementById('cat-table').innerHTML = `
        <div class="table-header"><div class="table-title">Categories</div></div>
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Description</th>${isAdmin?'<th>Actions</th>':''}</tr></thead>
          <tbody>${res.data.map(c=>`<tr>
            <td class="text-muted">${c.id}</td>
            <td><strong>${c.name}</strong></td>
            <td class="text-muted">${c.description||'—'}</td>
            ${isAdmin?`<td><div class="actions-cell">
              <button class="btn btn-ghost btn-sm" onclick="openCategoryModal(${c.id},'${c.name.replace(/'/g,"\\'")}','${(c.description||'').replace(/'/g,"\\'")}')">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id})">Del</button>
            </div></td>`:''}
          </tr>`).join('')}</tbody>
        </table>`;
    } catch (e) { toast(e.message, 'error'); }
  }

  function openCategoryModal(id=null, name='', desc='') {
    openModal(`
      <div class="modal-title">${id?'Edit':'Add'} Category <button class="modal-close" onclick="closeModalForce()">✕</button></div>
      <div class="form-group"><label>Name</label><input id="c-name" value="${name}" placeholder="Category name"/></div>
      <div class="form-group"><label>Description</label><input id="c-desc" value="${desc}" placeholder="Description"/></div>
      <button class="btn btn-primary btn-full" onclick="saveCategory(${id})">${id?'Update':'Create'}</button>`);
  }

  async function saveCategory(id) {
    const name = document.getElementById('c-name').value.trim();
    const description = document.getElementById('c-desc').value;
    if (!name) return toast('Name is required', 'error');
    try {
      if (id) await api(`/categories/${id}`, { method: 'PUT', body: JSON.stringify({name, description}) });
      else await api('/categories', { method: 'POST', body: JSON.stringify({name, description}) });
      toast(id ? 'Category updated' : 'Category created', 'success');
      closeModalForce(); fetchCategories();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function deleteCategory(id) {
    if (!confirm('Delete this category?')) return;
    try {
      await api(`/categories/${id}`, { method: 'DELETE' });
      toast('Category deleted', 'success');
      fetchCategories();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ═══════════════════════════════════════════════
  // ─── SHOP ───
  // ═══════════════════════════════════════════════
  let shopPage = 0, shopCat = '', shopMin = '', shopMax = '', shopSearch = '';
  async function renderShop() {
    const el = document.getElementById('page-content');
    el.innerHTML = `
      <div class="filters-row">
        <div class="filter-group"><label>Search</label><input id="sh-search" placeholder="Product name..." oninput="shopSearch=this.value;shopPage=0;fetchShop()"/></div>
        <div class="filter-group"><label>Category</label><select id="sh-cat" onchange="shopCat=this.value;shopPage=0;fetchShop()"><option value="">All Categories</option></select></div>
        <div class="filter-group"><label>Min Price</label><input id="sh-min" type="number" placeholder="$0" oninput="shopMin=this.value;shopPage=0;fetchShop()"/></div>
        <div class="filter-group"><label>Max Price</label><input id="sh-max" type="number" placeholder="Any" oninput="shopMax=this.value;shopPage=0;fetchShop()"/></div>
        <button class="btn btn-ghost btn-sm" onclick="shopSearch='';shopCat='';shopMin='';shopMax='';shopPage=0;document.getElementById('sh-search').value='';document.getElementById('sh-cat').value='';document.getElementById('sh-min').value='';document.getElementById('sh-max').value='';fetchShop()">Clear</button>
      </div>
      <div class="products-grid" id="shop-grid"></div>
      <div class="pagination" id="shop-pagination"></div>`;
    await populateCategoryFilter('sh-cat');
    fetchShop();
  }

  async function populateCategoryFilter(selectId) {
    try {
      const res = await api('/categories');
      const sel = document.getElementById(selectId);
      if (!sel) return;
      res.data.forEach(c => { const o = document.createElement('option'); o.value=c.id; o.textContent=c.name; sel.appendChild(o); });
    } catch {}
  }

  async function fetchShop() {
    const params = new URLSearchParams({ page: shopPage, size: 8 });
    if (shopSearch) params.set('name', shopSearch);
    if (shopCat) params.set('categoryId', shopCat);
    if (shopMin) params.set('minPrice', shopMin);
    if (shopMax) params.set('maxPrice', shopMax);
    try {
      const res = await api(`/products/search?${params}`);
      const { content, totalPages } = res.data;
      const grid = document.getElementById('shop-grid');
      if (!content?.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><p>No products match your filters</p></div>`;
        document.getElementById('shop-pagination').innerHTML = '';
        return;
      }
      grid.innerHTML = content.map(p => `
        <div class="product-card">
          <img class="product-card-img" src="${p.imageUrl||'https://via.placeholder.com/240x170'}" onerror="this.src='https://via.placeholder.com/240x170'" />
          <div class="product-card-body">
            <div class="product-card-name">${p.name}</div>
            <div class="product-card-desc">${p.description||'No description available.'}</div>
            <div class="product-card-footer">
              <div class="product-card-price">${fmt(p.price)}</div>
              ${stockBadge(p.stockQuantity)}
            </div>
            <button class="btn btn-primary btn-full" style="margin-top:0.8rem" ${p.stockQuantity===0?'disabled':''} onclick="addToCartQuick(${p.id},'${p.name.replace(/'/g,"\\'")}')">
              ${p.stockQuantity===0 ? 'Out of Stock' : '🛒 Add to Cart'}
            </button>
          </div>
        </div>`).join('');
      renderPagination('shop-pagination', shopPage, totalPages, (pg) => { shopPage=pg; fetchShop(); });
    } catch (e) { toast(e.message, 'error'); }
  }

  async function addToCartQuick(productId, name) {
    try {
      const res = await api('/cart/items', { method: 'POST', body: JSON.stringify({ productId, quantity: 1 }) });
      state.cart = res.data;
      updateCartBadge();
      toast(`"${name}" added to cart!`, 'success');
    } catch (e) { toast(e.message, 'error'); }
  }

  // ═══════════════════════════════════════════════
  // ─── CART ───
  // ═══════════════════════════════════════════════
  async function renderCart() {
    const el = document.getElementById('page-content');
    try {
      const res = await api('/cart');
      state.cart = res.data;
      updateCartBadge();
      const items = state.cart?.items || [];
      if (!items.length) {
        el.innerHTML = `<div class="empty-state" style="padding:5rem">
          <div class="icon">🛒</div>
          <p>Your cart is empty</p>
          <button class="btn btn-primary" style="margin-top:1.5rem" onclick="navigate('shop')">Browse Shop</button>
        </div>`;
        return;
      }
      const subtotal = items.reduce((s,i) => s + parseFloat(i.product.price)*i.quantity, 0);
      el.innerHTML = `
        <div class="cart-container">
          <div class="table-card p-0">
            <div class="table-header"><div class="table-title">Cart Items (${items.length})</div>
              <button class="btn btn-danger btn-sm" onclick="clearCart()">Clear All</button>
            </div>
            ${items.map(item => `
              <div class="cart-item-row">
                <img class="product-img" src="${item.product.imageUrl||''}" onerror="this.src='https://via.placeholder.com/44'" style="width:56px;height:56px"/>
                <div style="flex:1">
                  <div class="product-name">${item.product.name}</div>
                  <div class="text-muted">${fmt(item.product.price)} each</div>
                </div>
                <div class="qty-control">
                  <button class="qty-btn" onclick="updateQty(${item.id},${item.quantity-1})">−</button>
                  <span style="min-width:24px;text-align:center;font-weight:600">${item.quantity}</span>
                  <button class="qty-btn" onclick="updateQty(${item.id},${item.quantity+1})">+</button>
                </div>
                <div class="price-tag" style="min-width:70px;text-align:right">${fmt(parseFloat(item.product.price)*item.quantity)}</div>
                <button class="btn btn-danger btn-sm" onclick="removeItem(${item.id})">✕</button>
              </div>`).join('')}
          </div>
          <div class="order-summary-card">
            <div class="table-title mb-2">Order Summary</div>
            <div class="summary-row"><span>Subtotal (${items.length} items)</span><span>${fmt(subtotal)}</span></div>
            <div class="summary-row"><span>Shipping</span><span class="text-success">Free</span></div>
            <div class="summary-row total"><span>Total</span><span>${fmt(subtotal)}</span></div>
            <button class="btn btn-primary btn-full" style="margin-top:1rem" onclick="openCheckout(${subtotal.toFixed(2)})">
              Checkout →
            </button>
            <button class="btn btn-ghost btn-full" style="margin-top:0.6rem" onclick="navigate('shop')">Continue Shopping</button>
          </div>
        </div>`;
    } catch (e) { toast(e.message, 'error'); }
  }

  async function updateQty(itemId, qty) {
    try {
      const res = await api(`/cart/items/${itemId}`, { method: 'PUT', body: JSON.stringify({ quantity: qty }) });
      state.cart = res.data;
      updateCartBadge();
      renderCart();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function removeItem(itemId) {
    try {
      const res = await api(`/cart/items/${itemId}`, { method: 'DELETE' });
      state.cart = res.data;
      updateCartBadge();
      renderCart();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function clearCart() {
    if (!confirm('Clear entire cart?')) return;
    try {
      await api('/cart', { method: 'DELETE' });
      state.cart = null;
      updateCartBadge();
      renderCart();
    } catch (e) { toast(e.message, 'error'); }
  }

  function openCheckout(total) {
    openModal(`
      <div class="modal-title">Checkout <button class="modal-close" onclick="closeModalForce()">✕</button></div>
      <div class="summary-row" style="font-size:1rem"><span>Order Total</span><span class="price-tag">${fmt(total)}</span></div>
      <div class="divider"></div>
      <div class="form-group">
        <label>Shipping Address *</label>
        <textarea id="shipping-addr" rows="3" placeholder="Enter your full shipping address..."></textarea>
      </div>
      <button class="btn btn-primary btn-full" onclick="placeOrder()">🎉 Place Order</button>`);
  }

  async function placeOrder() {
    const shippingAddress = document.getElementById('shipping-addr').value.trim();
    if (!shippingAddress) return toast('Shipping address is required', 'error');
    try {
      await api('/orders', { method: 'POST', body: JSON.stringify({ shippingAddress }) });
      toast('🎉 Order placed successfully!', 'success');
      state.cart = null;
      updateCartBadge();
      closeModalForce();
      navigate('my-orders');
    } catch (e) { toast(e.message, 'error'); }
  }

  // ═══════════════════════════════════════════════
  // ─── MY ORDERS ───
  // ═══════════════════════════════════════════════
  async function renderMyOrders() {
    const el = document.getElementById('page-content');
    el.innerHTML = `<div class="table-card">Loading...</div>`;
    try {
      const res = await api('/orders/my-orders');
      const orders = res.data || [];
      if (!orders.length) {
        el.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p>No orders yet. <a href="#" onclick="navigate('shop')" style="color:var(--accent)">Start shopping!</a></p></div>`;
        return;
      }
      el.innerHTML = orders.map(o => `
        <div class="table-card" style="margin-bottom:1rem">
          <div class="table-header">
            <div>
              <div class="table-title">Order #${o.id}</div>
              <div class="text-muted" style="margin-top:0.2rem">${fmtDate(o.createdAt)} · ${o.orderItems?.length||0} items · <span class="price-tag">${fmt(o.totalAmount)}</span></div>
            </div>
            ${statusBadge(o.status)}
          </div>
          ${orderTimeline(o.status)}
          <div style="padding:0.5rem 1.2rem 1.2rem">
            <div class="text-muted" style="font-size:0.8rem;margin-bottom:0.8rem">📍 ${o.shippingAddress}</div>
            <table style="width:100%">
              <thead><tr><th>Product</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr></thead>
              <tbody>${(o.orderItems||[]).map(item=>`<tr>
                <td>${item.product?.name||'—'}</td>
                <td>${item.quantity}</td>
                <td class="price-tag">${fmt(item.unitPrice)}</td>
                <td class="price-tag">${fmt(item.subtotal)}</td>
              </tr>`).join('')}</tbody>
            </table>
          </div>
        </div>`).join('');
    } catch (e) { el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`; }
  }

  // ═══════════════════════════════════════════════
  // ─── ALL ORDERS (Admin) ───
  // ═══════════════════════════════════════════════
  let orderPage = 0, orderStatus = '';
  async function renderAllOrders() {
    const el = document.getElementById('page-content');
    el.innerHTML = `
      <div class="filters-row">
        <div class="filter-group">
          <label>Filter by Status</label>
          <select id="ord-status" onchange="orderStatus=this.value;orderPage=0;fetchAllOrders()">
            <option value="">All Statuses</option>
            <option value="PENDING">Pending</option>
            <option value="CONFIRMED">Confirmed</option>
            <option value="SHIPPED">Shipped</option>
            <option value="DELIVERED">Delivered</option>
            <option value="CANCELLED">Cancelled</option>
          </select>
        </div>
      </div>
      <div class="table-card" id="orders-table">Loading...</div>
      <div class="pagination" id="orders-pagination"></div>`;
    fetchAllOrders();
  }

  async function fetchAllOrders() {
    const params = new URLSearchParams({ page: orderPage, size: 10 });
    if (orderStatus) params.set('status', orderStatus);
    try {
      const res = await api(`/orders?${params}`);
      const { content, totalPages } = res.data;
      document.getElementById('orders-table').innerHTML = `
        <div class="table-header"><div class="table-title">All Orders</div></div>
        <table>
          <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${(content||[]).map(o=>`<tr>
            <td><span class="text-accent font-bold">#${o.id}</span></td>
            <td>${o.user?.username||'—'}</td>
            <td>${o.orderItems?.length||0}</td>
            <td class="price-tag">${fmt(o.totalAmount)}</td>
            <td class="text-muted">${fmtDate(o.createdAt)}</td>
            <td>${statusBadge(o.status)}</td>
            <td>
              <select class="page-btn" style="font-size:0.75rem" onchange="updateStatus(${o.id},this.value)" ${['DELIVERED','CANCELLED'].includes(o.status)?'disabled':''}>
                ${nextStatuses(o.status).map(s=>`<option value="${s}">${s==='__current'?o.status+' (current)':s}</option>`).join('')}
              </select>
            </td>
          </tr>`).join('')}</tbody>
        </table>`;
      renderPagination('orders-pagination', orderPage, totalPages, (p)=>{orderPage=p;fetchAllOrders();});
    } catch (e) { toast(e.message, 'error'); }
  }

  function nextStatuses(current) {
    const map = { PENDING: ['__current','CONFIRMED','CANCELLED'], CONFIRMED: ['__current','SHIPPED','CANCELLED'], SHIPPED: ['__current','DELIVERED'], DELIVERED: ['__current'], CANCELLED: ['__current'] };
    return map[current] || ['__current'];
  }

  async function updateStatus(orderId, status) {
    if (status === '__current') return;
    try {
      await api(`/orders/${orderId}/status`, { method: 'PUT', body: JSON.stringify({ status }) });
      toast(`Order #${orderId} → ${status}`, 'success');
      fetchAllOrders();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ─── STARTUP ───
  if (state.token && state.user) {
    initApp();
  }
</script>
</body>
</html>
