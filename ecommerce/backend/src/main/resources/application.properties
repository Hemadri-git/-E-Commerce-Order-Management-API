# ===================================
# E-Commerce Order Management API
# ===================================

# Server
server.port=8080

# Database - Update these with your MySQL credentials
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1233
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Initialize seed data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=ecommerce_super_secret_key_must_be_at_least_256_bits_long_for_hs256_algorithm
jwt.expiration=86400000

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false

# Logging
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.security=INFO
